version: '3.8'

services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    container_name: freqtrade
    restart: unless-stopped
    volumes:
      - freqtrade-data:/freqtrade/user_data
    ports:
      - "8080:8080"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /freqtrade/user_data/logs /freqtrade/user_data/strategies
        cat > /freqtrade/user_data/config.json << EOFCONFIG
        {
          "max_open_trades": 3,
          "stake_currency": "USDT",
          "stake_amount": "unlimited",
          "tradable_balance_ratio": 0.99,
          "fiat_display_currency": "USD",
          "dry_run": true,
          "dry_run_wallet": 10000,
          "cancel_open_orders_on_exit": false,
          "trading_mode": "spot",
          "unfilledtimeout": {"entry": 10, "exit": 10, "exit_timeout_count": 0, "unit": "minutes"},
          "entry_pricing": {"price_side": "same", "use_order_book": true, "order_book_top": 1},
          "exit_pricing": {"price_side": "same", "use_order_book": true, "order_book_top": 1},
          "exchange": {
            "name": "binance",
            "key": "",
            "secret": "",
            "pair_whitelist": ["BTC/USDT", "ETH/USDT", "SOL/USDT", "XRP/USDT", "BNB/USDT"],
            "pair_blacklist": []
          },
          "pairlists": [{"method": "StaticPairList"}],
          "telegram": {
            "enabled": true,
            "token": "${TELEGRAM_BOT_TOKEN}",
            "chat_id": "${TELEGRAM_CHAT_ID}"
          },
          "api_server": {
            "enabled": true,
            "listen_ip_address": "0.0.0.0",
            "listen_port": 8080,
            "verbosity": "error",
            "jwt_secret_key": "${JWT_SECRET_KEY}",
            "ws_token": "${WS_TOKEN}",
            "username": "${API_USERNAME}",
            "password": "${API_PASSWORD}"
          },
          "bot_name": "freqtrade_rabiaa",
          "initial_state": "running"
        }
        EOFCONFIG
        exec freqtrade trade --logfile /freqtrade/user_data/logs/freqtrade.log --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite --config /freqtrade/user_data/config.json --strategy SampleStrategy
    environment:
      - API_USERNAME=${API_USERNAME}
      - API_PASSWORD=${API_PASSWORD}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - WS_TOKEN=${WS_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}

volumes:
  freqtrade-data:
